server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Allow bill uploads up to 20 MB (nginx default is 1 MB, which would 413 phone photos).
    client_max_body_size 20m;

    # SPA client-side routing: fall back to index.html for unknown paths.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend. The trailing slash on proxy_pass strips the
    # /api prefix, so /api/healthz → http://api:8000/healthz (matches the backend routes).
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
